<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>公众号论文写作工具</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.7.76/pdf.min.mjs" type="module"></script>
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <h1>公众号论文写作工具</h1>
        <p>上传论文或输入 URL，生成可直接粘贴到微信公众平台的富文本。</p>
      </div>
      <div class="actions">
        <select id="historySelect" aria-label="选择历史生成记录">
          <option value="">选择历史记录</option>
        </select>
        <button id="refreshHistory" type="button" title="刷新历史记录">刷新</button>
        <button id="generateBtn" class="primary" type="button">开始生成</button>
        <button id="copyBtn" type="button" disabled>复制</button>
      </div>
    </header>

    <main class="workspace">
      <section class="info-pane">
        <form id="paperForm" class="input-panel">
          <div class="source-tabs" role="tablist">
            <label><input type="radio" name="source_type" value="url" checked> URL</label>
            <label><input type="radio" name="source_type" value="pdf"> PDF</label>
          </div>
          <input id="paperUrl" name="paper_url" type="url" placeholder="https://arxiv.org/abs/..." autocomplete="off">
          <input id="paperPdf" name="paper_pdf" type="file" accept="application/pdf">
          <div class="preset-row">
            <select id="presetSelect" name="preset_id" aria-label="选择主题预设"></select>
            <button id="newPresetBtn" type="button">新建预设</button>
            <button id="editPresetBtn" type="button">修改预设</button>
          </div>
          <textarea name="focus_authors" rows="2" placeholder="重点关注作者，可用逗号分隔"></textarea>
          <div class="progress-panel" aria-live="polite">
            <div class="progress-header">
              <span id="progressLabel">等待开始</span>
              <strong id="progressPercent">0%</strong>
            </div>
            <div class="progress-track">
              <div id="progressBar" class="progress-bar" style="width: 0%"></div>
            </div>
            <div id="progressLog" class="progress-log">
              <p>等待输入。</p>
            </div>
          </div>
        </form>

        <div class="meta-panel">
          <div id="metaTitleRow"><span>论文标题</span><strong id="metaTitle"></strong></div>
          <div id="metaProjectRow"><span>项目地址</span><a id="metaProject" href="#" target="_blank"></a></div>
          <div id="metaPaperRow"><span>论文地址</span><a id="metaPaper" href="#" target="_blank"></a></div>
          <p id="statusLine">等待输入。</p>
        </div>

        <section class="iterate-panel">
          <div class="iterate-head">
            <strong>迭代修改</strong>
            <span id="selectionStatus">未选择局部</span>
          </div>
          <textarea id="iteratePrompt" rows="5" placeholder="输入修改要求；如需局部修改，先在右侧富文本中选中一段内容。"></textarea>
          <button id="iterateBtn" class="primary" type="button" disabled>应用修改</button>
          <p id="iterateStatus">生成完成后可迭代修改。</p>
        </section>
      </section>

      <section class="pdf-pane">
        <div class="pdf-panel">
          <div class="pdf-toolbar">
            <button id="prevPage" type="button">上一页</button>
            <span><b id="pageNum">0</b> / <b id="pageCount">0</b></span>
            <button id="nextPage" type="button">下一页</button>
            <button id="zoomOut" type="button">缩小</button>
            <button id="zoomIn" type="button">放大</button>
            <div id="shotModal" class="shot-tools" hidden>
              <span>拖拽选择截图区域</span>
              <button id="cancelShot" type="button">取消</button>
              <button id="saveShot" class="primary" type="button" disabled>保存截图</button>
            </div>
          </div>
          <div id="pdfStage" class="pdf-stage">
            <canvas id="pdfCanvas"></canvas>
            <div id="selectionBox" class="selection-box"></div>
            <div class="empty-state">生成后论文会显示在这里</div>
          </div>
        </div>
      </section>

      <section class="right-pane">
        <section class="generated-panel">
          <div class="generated-card">
            <span>推送标题</span>
            <strong id="generatedTitle">生成完成后显示</strong>
            <div id="generatedTitleOptions" class="title-options"></div>
          </div>
          <div class="generated-card">
            <span>结尾提问</span>
            <p id="generatedQuestion">生成完成后显示</p>
          </div>
        </section>
        <div class="preview-toolbar">
          <div class="editor-tools" aria-label="富文本编辑工具">
            <button type="button" data-command="bold" title="加粗"><strong>B</strong></button>
            <button type="button" data-block="h2" title="节标题">标题</button>
            <button type="button" data-block="p" title="正文">正文</button>
            <button type="button" data-action="image" title="插入图片">图片</button>
            <button type="button" data-command="undo" title="撤销">撤销</button>
            <button type="button" data-command="redo" title="重做">重做</button>
          </div>
          <span id="copyStatus">生成完成后可复制</span>
        </div>
        <article id="copySource" class="wechat-preview" contenteditable="true"></article>
      </section>
    </main>
  </div>

  <div id="imageMenu" class="image-menu" hidden>
    <div class="image-menu-card">
      <strong id="imageMenuTitle">添加图片</strong>
      <p>选择从当前 PDF 截图，或上传本地图片。</p>
      <div>
        <button id="chooseScreenshot" class="primary" type="button">PDF 截图</button>
        <button id="chooseUpload" type="button">本地上传</button>
        <button id="cancelImageMenu" type="button">取消</button>
      </div>
    </div>
  </div>
  <input id="localImageInput" type="file" accept="image/*" hidden>
  <input id="presetImageInput" type="file" accept="image/*" hidden>

  <div id="dialogModal" class="dialog-modal" hidden>
    <div class="dialog-card" role="dialog" aria-modal="true" aria-labelledby="dialogTitle">
      <strong id="dialogTitle">提示</strong>
      <p id="dialogMessage"></p>
      <div class="dialog-actions">
        <button id="dialogCancel" type="button">取消</button>
        <button id="dialogConfirm" class="primary" type="button">确定</button>
      </div>
    </div>
  </div>

  <div id="presetStudio" class="studio-modal" hidden>
    <div class="studio-shell">
      <div class="studio-toolbar">
        <strong id="studioTitle">预设编辑器</strong>
        <div class="studio-actions">
          <button id="studioCancel" type="button">关闭</button>
          <button id="studioSave" class="primary" type="button">保存预设</button>
        </div>
      </div>
      <div class="studio-body">
        <section class="studio-controls">
          <label>预设名称<input id="presetName" type="text" placeholder="例如：学术蓝卡片"></label>
          <label>提示词风格<textarea id="presetPromptHint" rows="4" placeholder="告诉模型这套风格更像什么样的公众号文章"></textarea></label>
          <div class="studio-grid">
            <label>主题主色<input id="presetPrimary" type="color"></label>
            <label>强调/卡片色<input id="presetSecondary" type="color"></label>
            <label>正文颜色<input id="presetText" type="color"></label>
            <label>背景色<input id="presetSurface" type="color"></label>
            <label>标题底色<input id="presetHeadingBg" type="color"></label>
            <label>标题文字色<input id="presetHeadingText" type="color"></label>
            <label>粗体颜色<input id="presetBold" type="color"></label>
            <label>左侧竖线色<input id="presetLeftLine" type="color"></label>
            <label>信息卡片底色<input id="presetPaperInfoBg" type="color"></label>
          </div>
          <div class="studio-grid">
            <label>正文对齐
              <select id="presetBodyAlign">
                <option value="justify">两端对齐</option>
                <option value="left">左对齐</option>
                <option value="center">居中</option>
              </select>
            </label>
            <label>标题对齐
              <select id="presetHeadingAlign">
                <option value="center">居中</option>
                <option value="left">左对齐</option>
                <option value="right">右对齐</option>
              </select>
            </label>
            <label>标题样式
              <select id="presetHeadingStyle">
                <option value="card">卡片标题</option>
                <option value="left-line">左侧竖线</option>
                <option value="plain">纯文字</option>
              </select>
            </label>
            <label>论文信息样式
              <select id="presetPaperInfoStyle">
                <option value="card">卡片</option>
                <option value="list">普通列表</option>
              </select>
            </label>
            <label>正文大小<input id="presetBodyFontSize" type="range" min="12" max="18" step="1"></label>
            <label>标题大小<input id="presetHeadingFontSize" type="range" min="14" max="22" step="1"></label>
            <label>行高<input id="presetLineHeight" type="range" min="22" max="34" step="1"></label>
          </div>
          <div class="studio-grid studio-images">
            <label>文首图片 URL<input id="presetHeadUrl" type="text" placeholder="/public/presets/assets/..."></label>
            <button id="uploadHeadImageBtn" type="button">上传文首图</button>
            <label>文末图片 URL<input id="presetTailUrl" type="text" placeholder="/public/presets/assets/..."></label>
            <button id="uploadTailImageBtn" type="button">上传文末图</button>
          </div>
        </section>
        <section class="studio-preview-panel">
          <div class="studio-preview-toolbar">
            <span>右侧为预设示例预览</span>
            <button id="refreshPresetPreview" type="button">刷新预览</button>
          </div>
          <article id="presetPreview" class="wechat-preview studio-preview"></article>
        </section>
      </div>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
